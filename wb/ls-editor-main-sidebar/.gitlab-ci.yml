stages:
  - validate
  - package

default:
  image: alpine:3.20
  before_script:
    - apk add --no-cache jq zip

variables:
  EXTENSION_NAME: ls-editor

validate:manifest:
  stage: validate
  script:
    - test -f manifest.json
    - test -f popup.html
    - test -d src
    - jq -e . manifest.json > /dev/null
    - jq -e '.manifest_version == 3' manifest.json > /dev/null
    - jq -e '.action.default_popup == "popup.html"' manifest.json > /dev/null

package:extension:
  stage: package
  needs:
    - job: validate:manifest
  script:
    - mkdir -p dist
    - zip -r "dist/${EXTENSION_NAME}.zip" . -x ".git/*" "dist/*" ".gitlab-ci.yml"
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "dist/${EXTENSION_NAME}.zip"
    expire_in: 7 days
